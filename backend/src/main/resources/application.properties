spring.application.name=mediconnect
spring.profiles.active=dev
server.port=8080
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:postgresql://localhost:5432/mediconnect
spring.datasource.username=mediconnect
spring.datasource.password=mediconnect_dev
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:dev-secret-key-min-32-chars-for-hs256-signing}
jwt.expiry.minutes=${JWT_EXPIRY_MINUTES:60}
jwt.refresh-token.expiry.days=${JWT_REFRESH_EXPIRY_DAYS:30}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

logging.level.root=INFO
logging.level.com.mediconnect=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

spring.jackson.serialization.write-dates-as-timestamps=false
management.endpoints.web.exposure.include=health,metrics
