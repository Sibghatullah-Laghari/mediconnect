spring.application.name=mediconnect
spring.profiles.default=prod
server.port=8080
server.servlet.context-path=/api/v1

spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Disable Open Session in View to avoid lazy loads during serialization
spring.jpa.open-in-view=false

# Actuator configuration
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=mediconnect

# Performance & Caching
spring.cache.type=caffeine
spring.cache.cache-names=doctors,specializations,availability

# HikariCP connection pool tuning (adjust in PROD via env vars)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate batching and fetching
aom.springframework.jdbc.getParameterType.ignore=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.default_batch_fetch_size=64

spring.jackson.serialization.write-dates-as-timestamps=false

logging.level.root=INFO
logging.level.com.mediconnect=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

app.security.max-failed-attempts=5
app.security.lockout-duration-minutes=15

# A simple 32+ character plain text string for local dev
jwt.secret=this-is-my-super-secret-development-key-32-chars
jwt.expiration=86400000
jwt.expiry.minutes=60
jwt.refresh-token.expiry.days=30
jwt.refresh-expiration=604800000

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging.level.org.springframework.security=TRACE

logging.level.org.springframework.web.cors=TRACE

