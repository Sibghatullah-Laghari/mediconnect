spring.profiles.active=test
server.servlet.context-path=/api/v1

spring.datasource.url=jdbc:h2:mem:mediconnect-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

spring.mail.host=localhost
spring.mail.port=2525

jwt.secret=test-secret-key-test-secret-key-test-secret-key
jwt.expiry.minutes=60
jwt.refresh-token.expiry.days=30
