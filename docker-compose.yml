services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediconnect
      POSTGRES_USER: mediconnect
      POSTGRES_PASSWORD: mediconnect_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediconnect -d mediconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/mediconnect
      DB_USERNAME: mediconnect
      DB_PASSWORD: mediconnect_dev
      JWT_SECRET: ${JWT_SECRET:-VGhpc0lzQURldk9ubHlTZWNyZXRLZXlGb3JNZWRpQ29ubmVjdEphdmEyMVRva2Vucw==}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
