spring.config.import=optional:file:.env

spring.application.name=mediconnect-api
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/mediconnect}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:VGhpc0lzQURldk9ubHlTZWNyZXRLZXlGb3JNZWRpQ29ubmVjdEphdmEyMVRva2Vucw==}
app.jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
app.jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
